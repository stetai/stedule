<!DOCTYPE html>
<!--
  WHY DOCTYPE: This first line tells the browser to use modern "standards mode".
  Without it, browsers fall back to "quirks mode" — legacy behaviour from the 1990s
  that will make your CSS behave unexpectedly. Always include it.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!--
    WHY charset: Declares the text encoding. Without it, special characters like
    accented letters or emoji may render as garbage. UTF-8 covers every human script.
  -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    WHY viewport: Without this, mobile browsers pretend your page is ~980px wide
    and zoom out. This tag tells them to use the actual device width instead.
    Essential for Android support.
  -->

  <title>Stedule</title>

  <!--
    Fonts loaded from Google Fonts CDN.
    "Bricolage Grotesque" for headings.
    "DM Mono" for date numbers.
    Bundle for Tauri support.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />

  <!--
    WHY type="module": ES Modules are the modern standard for splitting JS into
    multiple files. Without this attribute, the browser treats your script as a
    single global file and import/export statements will throw a SyntaxError.

    Key quirk: type="module" scripts are ALWAYS deferred — they run after the
    HTML is parsed. This means you don't need a DOMContentLoaded wrapper in
    app.js, but we include one anyway to make the dependency explicit and to
    teach the pattern clearly.

    IMPORTANT: ES modules require a server — they will not work if you open
    index.html directly via file:// in most browsers due to CORS restrictions.
    Run: python -m http.server 8080
    Then open: http://localhost:8080
  -->
  <script type="module" src="js/app.js"></script>
</head>

<body>

  <!-- =====================================================================
    HEADER: navigation controls and view switcher
    ===================================================================== -->
  <header class="app-header">
    <div class="header-left">
      <h1 class="app-title">Stedule</h1>
      <button id="btn-today" class="btn btn-ghost">Today</button>
      <div class="nav-arrows">
        <button id="btn-prev" class="btn btn-icon" aria-label="Previous period">&#8249;</button>
        <button id="btn-next" class="btn btn-icon" aria-label="Next period">&#8250;</button>
      </div>
      <span id="current-period" class="period-label">Loading...</span>
    </div>

    <div class="header-right">
      <!--
        data-view is a "data attribute" — a way to attach arbitrary metadata
        to HTML elements. In app.js we read it with element.dataset.view.
        This avoids needing separate IDs for each button.
      -->
      <div class="view-switcher" id="view-switcher">
        <button class="btn btn-view active" data-view="month">Month</button>
        <button class="btn btn-view" data-view="week">Week</button>
        <button class="btn btn-view" data-view="day">Day</button>
      </div>

      <button id="btn-open" class="btn btn-primary">
        <!-- SVG icon inline — no image file needed, scales perfectly at any size -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        Open .ics file
      </button>
    </div>
  </header>

  <!-- =====================================================================
    MAIN CALENDAR AREA
    ===================================================================== -->
  <main class="calendar-container">

    <!-- Day-of-week column headers. Static HTML is fine here because
         they never change. We build only the dynamic grid in JS. -->
    <div class="weekday-headers" id="weekday-headers">
      <div class="weekday-label">Sun</div>
      <div class="weekday-label">Mon</div>
      <div class="weekday-label">Tue</div>
      <div class="weekday-label">Wed</div>
      <div class="weekday-label">Thu</div>
      <div class="weekday-label">Fri</div>
      <div class="weekday-label">Sat</div>
    </div>

    <!--
      The calendar grid itself. This div is EMPTY in the HTML — app.js fills
      it with day cells on every render. This is the core pattern of web UIs:
      HTML provides the skeleton, JS injects the dynamic content.
    -->
    <div class="calendar-grid" id="calendar-grid">
      <!-- Populated by renderCalendar() in app.js -->
    </div>

  </main>

  <!-- =====================================================================
    EVENT MODAL: hidden by default, shown when user clicks a day or event.
    Keeping it in the HTML (rather than creating it in JS) is a deliberate
    choice: it's easier to style and inspect. JS just toggles visibility.
    ===================================================================== -->
  <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 id="modal-title">New Event</h2>
        <button class="btn btn-icon modal-close" id="modal-close" aria-label="Close">&#x2715;</button>
      </div>

      <div class="modal-body">
        <!--
          WHY no <form>: We use divs + buttons instead of a <form> element.
          <form> has default submit behaviour that sends an HTTP request and
          reloads the page — the opposite of what a JS app wants. You can
          suppress it with event.preventDefault(), but avoiding <form>
          entirely is simpler until you understand the nuance.
        -->

        <div class="field-group">
          <label for="event-title">Title</label>
          <input type="text" id="event-title" placeholder="Event name" autocomplete="off" />
        </div>

        <div class="field-group field-row">
          <div class="field-group">
            <label for="event-date">Date</label>
            <input type="date" id="event-date" />
          </div>
          <div class="field-group">
            <label for="event-start-time">Start</label>
            <input type="time" id="event-start-time" value="09:00" />
          </div>
          <div class="field-group">
            <label for="event-end-time">End</label>
            <input type="time" id="event-end-time" value="10:00" />
          </div>
        </div>

        <div class="field-group">
          <label for="event-description">Description</label>
          <textarea id="event-description" rows="3" placeholder="Optional notes"></textarea>
        </div>

        <div class="field-group">
          <label for="event-color">Colour</label>
          <input type="color" id="event-color" value="#4f72ff" />
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-delete" style="display:none; color: var(--color-danger);">
          Delete event
        </button>
        <div class="modal-footer-right">
          <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
          <button class="btn btn-primary" id="modal-save">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!--
    Status bar: shows save state.
    Small UX touch that teaches an important pattern: always give users
    feedback when their data is being written to disk.
  -->
  <div class="status-bar" id="status-bar"></div>

</body>
</html>
